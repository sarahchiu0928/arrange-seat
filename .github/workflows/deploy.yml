name: Build and Deploy
on:
  push:
    branches:
      - 'main'

jobs:
  build-and-deploy:
    concurrency:
      group: 'pages'
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install and Build 🔧
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }} # 修改成需要的變數
        run: |
          pnpm install --frozen-lockfile
          pnpm run build 
          cd dist
          cp index.html 404.html
        
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: production
          folder: dist
          path: './dist'